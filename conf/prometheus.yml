global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "fitbox_app"
    basic_auth:
      username: 'admin@gmail.com'
      password_file: /etc/prometheus/metrics_pwd
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["fitbox.bounceme.net"]

  - job_name: "ins_control_asutp"
    basic_auth:
      username: 'admin@gmail.com'
      password_file: /etc/prometheus/metrics_pwd
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ["asutp.ias-app.ru"]
        labels:
          instance: "asutp"

  - job_name: "ins_control_test"
    basic_auth:
      username: 'admin@gmail.com'
      password_file: /etc/prometheus/metrics_pwd
    metrics_path: /metrics
    scheme: https
    static_configs:
      - targets: ["test.ias-app.ru"]
        labels:
          instance: "test"

  - job_name: "ins_control_avik"
    basic_auth:
