apiVersion: 1

contactPoints:
  - orgId: 1
    name: Telegram
    receivers:
      - uid: telegram_receiver
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          message: |
            🔴 *Сервис недоступен*
            Сервис: {{ index .Labels "instance" }}
            Статус: {{ .Status }}
            {{ if .EndsAt }}Восстановлен: {{ .EndsAt }}{{ end }}
        disableResolveMessage: false
